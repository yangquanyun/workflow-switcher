name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Node.js 22
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Check shell scripts
        if: runner.os != 'Windows'
        run: bash -n scripts/install.sh scripts/uninstall.sh

      - name: Check PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw scripts/install.ps1)) | Out-Null
          [scriptblock]::Create((Get-Content -Raw scripts/uninstall.ps1)) | Out-Null
